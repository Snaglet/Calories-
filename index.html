// ─── OpenAI helpers ───────────────────────────────────────────────────────────
async function analyze(apiKey, imageBase64, description) {
  const content = [];
  if (imageBase64) content.push({type:"image_url",image_url:{url:`data:image/jpeg;base64,${imageBase64}`,detail:"high"}});

  const sysPrompt = `You are a precise nutrition expert. Your job is to estimate calories as accurately as possible using USDA data, restaurant/brand published nutrition facts, and food label knowledge.

CRITICAL RULES:
- If the user describes a quantity (e.g. "two slim jims", "3 eggs", "large portion"), you MUST multiply the per-unit calories by that quantity. Never return single-serving calories when the user said they ate multiple.
- If you see a barcode or food package, identify the brand and product from visible text/logo and use the REAL published nutrition facts for that exact product — do not guess.
- Use REAL brand calories, not generic estimates. Examples: Bubba Burger original = 420 cal. Slim Jim Original = 80 cal each. Big Mac = 550 cal. Whopper = 660 cal.
- If a photo shows a plate of food, estimate the ACTUAL portion size visible, not a default serving size.
- Never return 0 calories for any real food item.
- Sum all ingredients to get totalCalories — never return a total less than the sum of parts.
- Also estimate totalProteinG and proteinG per ingredient using USDA/brand data. Examples: chicken breast 4oz = 35g protein. Egg = 6g. Bubba Burger = 20g. Slim Jim Original = 6g each.
- Return ONLY valid JSON, no markdown fences.`;

  const userPrompt = imageBase64
    ? `Analyze this meal${description ? ` and the user says: "${description}"` : ""}. If the user mentioned a quantity, multiply calories and protein accordingly. Return JSON:\n{"mealTitle":"...","totalCalories":0,"totalProteinG":0,"ingredients":[{"name":"...","calories":0,"proteinG":0}],"summary":"..."}`
    : `The user described their meal: "${description}". If they mentioned a quantity (like "two" or "3"), multiply the per-unit calories and protein by that number. Use real brand/USDA calorie and protein data. Return JSON:\n{"mealTitle":"...","totalCalories":0,"totalProteinG":0,"ingredients":[{"name":"...","calories":0,"proteinG":0}],"summary":"..."}`;

  content.push({type:"text",text:userPrompt});

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
    body:JSON.stringify({
      model:"gpt-4o",
      messages:[
        {role:"system",content:sysPrompt},
        {role:"user",content}
      ],
      max_tokens:600,
      temperature:0.1  // lower temp = more consistent, less hallucination
    })
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"OpenAI error");}
  const data = await res.json();
  return JSON.parse(data.choices[0].message.content.trim().replace(/```json|```/g,"").trim());
}

async function transcribeAudio(apiKey, blob) {
  const mimeType = blob.type || "audio/webm";
  const ext = mimeType.includes("mp4") ? "m4a" : mimeType.includes("ogg") ? "ogg" : "webm";
  const fd = new FormData();
  fd.append("file", blob, `audio.${ext}`);
  fd.append("model","whisper-1");
  fd.append("language","en");
  const res = await fetch("https://api.openai.com/v1/audio/transcriptions",{
    method:"POST",
    headers:{"Authorization":`Bearer ${apiKey}`},
    body:fd
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"Whisper error");}
  return (await res.json()).text || "";
}

// ─── Shared: Voice Visualizer ─────────────────────────────────────────────────
function VoiceVisualizer({active}) {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);
  const streamRef = useRef(null);
  const BARS = 24;
  useEffect(() => {
    const canvas = canvasRef.current; if(!canvas) return;
    const ctx = canvas.getContext("2d");
    const drawFlat = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const bw = canvas.width/BARS;
      ctx.fillStyle = "rgba(74,230,138,0.18)";
      for(let i=0;i<BARS;i++){const h=4;ctx.beginPath();ctx.roundRect(i*bw+1,(canvas.height-h)/2,bw-2,h,2);ctx.fill();}
    };
    if(!active){cancelAnimationFrame(rafRef.current);try{streamRef.current?.getTracks().forEach(t=>t.stop());}catch{}streamRef.current=null;drawFlat();return;}
    navigator.mediaDevices?.getUserMedia({audio:true,video:false}).then(stream=>{
      streamRef.current=stream;
      const ac=new(window.AudioContext||window.webkitAudioContext)();
      const src=ac.createMediaStreamSource(stream);
      const an=ac.createAnalyser();an.fftSize=64;src.connect(an);
      const buf=new Uint8Array(an.frequencyBinCount);
      const draw=()=>{
        rafRef.current=requestAnimationFrame(draw);
        an.getByteFrequencyData(buf);
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const bw=canvas.width/BARS,maxH=canvas.height*0.88;
        for(let i=0;i<BARS;i++){const val=buf[Math.floor(i*buf.length/BARS)]/255;const h=Math.max(4,val*maxH);ctx.fillStyle=`rgba(74,230,138,${0.3+val*0.7})`;ctx.beginPath();ctx.roundRect(i*bw+1,(canvas.height-h)/2,bw-2,h,3);ctx.fill();}
      };
      draw();
    }).catch(drawFlat);
    return()=>{cancelAnimationFrame(rafRef.current);try{streamRef.current?.getTracks().forEach(t=>t.stop());}catch{}};
  },[active]);
  return <div style={{width:"100%",height:56,display:"flex",alignItems:"center"}}>
    <canvas ref={canvasRef} width={340} height={56} style={{width:"100%",height:"100%",opacity:active?1:0.3,transition:"opacity 0.3s"}}/>
  </div>;
}

// ─── Weight sparkline ─────────────────────────────────────────────────────────
function WeightSparkline({data}) {
  if(data.length<2) return null;
  const W=120,H=36,P=4,vals=data.map(d=>d.value);
  const mn=Math.min(...vals),mx=Math.max(...vals),lo=mn-0.5,hi=mx+0.5,range=hi-lo||1;
  const tx=i=>P+(i/(data.length-1))*(W-P*2),ty=v=>P+(1-(v-lo)/range)*(H-P*2);
  const pts=data.map((d,i)=>`${tx(i)},${ty(d.value)}`).join(" ");
  const area=`M${tx(0)},${ty(data[0].value)} `+data.slice(1).map((d,i)=>`L${tx(i+1)},${ty(d.value)}`).join(" ")+` L${tx(data.length-1)},${H} L${tx(0)},${H} Z`;
  const last=data[data.length-1].value,prev=data[data.length-2].value,color=last<=prev?C.accent:C.red;
  return <svg width={W} height={H} style={{overflow:"visible"}}>
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill="url(#sg)"/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    <circle cx={tx(data.length-1)} cy={ty(last)} r="3" fill={color}/>
  </svg>;
}

// ─── Food item history for autocomplete ──────────────────────────────────────
const loadFoodHistory = () => { try { return JSON.parse(ls.get("jct:foodhist") || "[]"); } catch { return []; } };
const saveFoodHistory = arr => ls.set("jct:foodhist", JSON.stringify(arr));

// When a meal is added, save each ingredient to history
function recordFoodItems(ingredients) {
  if(!ingredients||!ingredients.length) return;
  const existing = loadFoodHistory();
  const map = {};
  existing.forEach(f => { map[f.name.toLowerCase()] = f; });
  ingredients.forEach(f => { map[f.name.toLowerCase()] = {name:f.name, calories:f.calories, proteinG:f.proteinG||0}; });
  saveFoodHistory(Object.values(map).slice(0,100));
}
function MealCard({meal,onTap,onQuickEdit,onDelete}) {
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(String(meal.totalCalories));
  const [swipeX,setSwipeX]=useState(0);
  const [swiping,setSwiping]=useState(false);
  const touchStartX=useRef(0);
  const touchStartY=useRef(0);
  const isWorkout=meal.type==="workout";
  const THRESHOLD=80;

  const commit=()=>{const n=parseInt(val);if(!isNaN(n)&&n>=0)onQuickEdit(meal.id,n);else setVal(String(meal.totalCalories));setEditing(false);};

  const onTouchStart=e=>{
    touchStartX.current=e.touches[0].clientX;
    touchStartY.current=e.touches[0].clientY;
    setSwiping(false);
  };
  const onTouchMove=e=>{
    const dx=e.touches[0].clientX-touchStartX.current;
    const dy=Math.abs(e.touches[0].clientY-touchStartY.current);
    if(dy>20&&Math.abs(dx)<20) return;
    if(dx<0){ // swipe LEFT to delete
      setSwiping(true);
      setSwipeX(Math.max(dx,-(THRESHOLD+30)));
    }
  };
  const onTouchEnd=()=>{
    if(swipeX<=-THRESHOLD){ onDelete(meal.id); }
    else { setSwipeX(0); setSwiping(false); }
  };

  return <div style={{position:"relative",marginBottom:10,borderRadius:16,overflow:"hidden"}}>
    {/* Delete background — right side, revealed by swiping left */}
    <div style={{position:"absolute",inset:0,background:C.red,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:20}}>
      <span style={{color:"#fff",fontSize:13,fontWeight:700,marginRight:6}}>Delete</span>
      <IcTrash/>
    </div>
    {/* Card — translates left on swipe */}
    <div
      style={{display:"flex",alignItems:"center",gap:12,background:C.card,border:`1px solid ${isWorkout?C.oMid:C.border}`,borderRadius:16,padding:"12px 14px",cursor:"pointer",animation:swiping?"none":"fadeUp 0.25s ease",transform:`translateX(${swipeX}px)`,transition:swiping?"none":"transform 0.3s ease"}}
      onClick={()=>{if(!editing&&swipeX===0)onTap(meal);}}
      onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
    >
      {meal.imageBase64
        ?<img src={`data:image/jpeg;base64,${meal.imageBase64}`} style={{width:54,height:54,borderRadius:12,objectFit:"cover",flexShrink:0}} alt=""/>
        :<div style={{width:54,height:54,borderRadius:12,background:isWorkout?C.oDim:C.hover,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:22}}>{isWorkout?"🔥":meal.emoji||"🍽️"}</span></div>
      }
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontSize:14,fontWeight:700,color:isWorkout?C.orange:C.text,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{meal.mealTitle}</p>
        <p style={{fontSize:11,color:C.sub,lineHeight:1.4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{meal.summary}</p>
        <p style={{fontSize:10,color:C.dim,marginTop:3}}>{meal.time}</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"8px 10px",background:isWorkout?C.oDim:C.aDim,borderRadius:12,minWidth:56,cursor:"pointer",position:"relative",flexShrink:0}} onClick={e=>{e.stopPropagation();setEditing(true);setVal(String(meal.totalCalories));}}>
        {editing
          ?<input autoFocus style={{width:48,background:"transparent",border:"none",borderBottom:`2px solid ${isWorkout?C.orange:C.accent}`,color:isWorkout?C.orange:C.accent,fontSize:16,fontWeight:800,textAlign:"center",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}} value={val} onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={e=>e.key==="Enter"&&commit()} onClick={e=>e.stopPropagation()}/>
          :<><span style={{fontSize:16,fontWeight:800,color:isWorkout?C.orange:C.accent,letterSpacing:"-0.5px"}}>{isWorkout?"-":""}{meal.totalCalories}</span><span style={{fontSize:9,color:isWorkout?C.oMid:C.aMid,textTransform:"uppercase"}}>{isWorkout?"burned":"kcal"}</span><span style={{position:"absolute",top:4,right:4,color:isWorkout?C.oMid:C.aMid}}><IcEdit/></span></>
        }
      </div>
    </div>
  </div>;
}

// ─── Workout modal ────────────────────────────────────────────────────────────
function WorkoutModal({onAdd,onClose}) {
  const [cal,setCal]=useState("");
  const [label,setLabel]=useState(()=>ls.get("jct:lastlabel")||"");
  const [suggestions,setSuggestions]=useState([]);
  const [showSugg,setShowSugg]=useState(false);
  const [allLabels]=useState(()=>loadWorkoutLabels());
  const calRef=useRef();

  useEffect(()=>{setTimeout(()=>calRef.current?.focus(),100);},[]);

  const handleLabelChange=(val)=>{
    setLabel(val);
    if(val.trim().length>0){
      const matches=allLabels.filter(l=>l.toLowerCase().includes(val.toLowerCase())&&l.toLowerCase()!==val.toLowerCase());
      setSuggestions(matches);
      setShowSugg(matches.length>0);
    } else {
      setShowSugg(false);
    }
  };

  const pickSuggestion=(s)=>{
    setLabel(s);
    setShowSugg(false);
  };

  const submit=()=>{
    const n=parseInt(cal);
    if(isNaN(n)||n<=0) return;
    const finalLabel=label.trim()||"Workout";
    // Persist label and update history
    ls.set("jct:lastlabel", finalLabel);
    if(finalLabel!=="Workout"){
      const updated=[...new Set([finalLabel,...allLabels])].slice(0,20);
      saveWorkoutLabels(updated);
    }
    const now=new Date();
    onAdd({
      id:uid(), type:"workout",
      mealTitle:finalLabel,
      totalCalories:n,
      ingredients:[],
      summary:`${n} calories burned`,
      imageBase64:null,
      time:now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),
      addedAt:now.getTime(),
      emoji:"🔥"
    });
  };

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end",zIndex:100}} onClick={onClose}>
    <div style={{width:"100%",background:C.surface,borderRadius:"20px 20px 0 0",padding:"24px 20px 48px",border:`1px solid ${C.border}`}} onClick={e=>e.stopPropagation()}>
      <div style={{width:36,height:4,background:C.border,borderRadius:2,margin:"0 auto 20px"}}/>
      <p style={{fontSize:17,fontWeight:800,color:C.text,marginBottom:4}}>Log Workout</p>
      <p style={{fontSize:12,color:C.sub,marginBottom:20}}>Calories burned will increase today's goal</p>

      {/* Label with autocomplete */}
      <div style={{position:"relative",marginBottom:12}}>
        <input type="text" placeholder="Activity (e.g. OrangeTheory, Walking…)" value={label}
          onChange={e=>handleLabelChange(e.target.value)}
          onFocus={()=>{ if(label.trim()&&suggestions.length>0) setShowSugg(true); }}
          onBlur={()=>setTimeout(()=>setShowSugg(false),150)}
          style={{width:"100%",background:C.hover,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,fontSize:15,padding:"12px 16px",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/>
        {showSugg&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",zIndex:10,marginTop:4}}>
          {suggestions.map((s,i)=>(
            <div key={i} onMouseDown={()=>pickSuggestion(s)}
              style={{padding:"12px 16px",fontSize:14,color:C.text,cursor:"pointer",borderBottom:i<suggestions.length-1?`1px solid ${C.border}`:"none",background:"transparent"}}

// ─── Recording hook ───────────────────────────────────────────────────────────
function useRecorder(apiKey, onTranscript) {
  const [phase, setPhase] = useState("idle"); // idle | requesting | recording | transcribing
  const [elapsed, setElapsed] = useState(0);
  const mrRef=useRef(null),chunksRef=useRef([]),timerRef=useRef(null),streamRef=useRef(null);

  const fmtTime = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  const stopAll = useCallback(() => {
    clearInterval(timerRef.current);
    try{mrRef.current?.stop();}catch{}
    try{streamRef.current?.getTracks().forEach(t=>t.stop());}catch{}
  },[]);

  const start = useCallback(async () => {
    setPhase("requesting"); setElapsed(0); chunksRef.current=[];
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      setMicPerm(); // remember permission was granted
      streamRef.current=stream;
      const mimeTypes=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg",""];
      const mimeType=mimeTypes.find(m=>!m||MediaRecorder.isTypeSupported(m))||"";
      const mr=new MediaRecorder(stream,mimeType?{mimeType}:{});
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:mr.mimeType||"audio/webm"});
        if(blob.size<1000){setPhase("idle");return;}
        setPhase("transcribing");
        try{const text=await transcribeAudio(apiKey,blob);onTranscript(text);setPhase("done");}
        catch(e){onTranscript("");setPhase("error");}
      };
      mr.start(250); mrRef.current=mr; setPhase("recording");
    } catch(e) {
      setPhase("error");
    }
  },[apiKey,onTranscript]);

  const stop = useCallback(() => { try{mrRef.current?.stop();}catch{} },[]);

  useEffect(()=>{
    if(phase==="recording"){timerRef.current=setInterval(()=>setElapsed(e=>e+1),1000);}
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[phase]);

  return {phase,elapsed,fmtTime,start,stop,stopAll};
}

// ─── Voice screen ─────────────────────────────────────────────────────────────
function VoiceScreen({apiKey,onBack,onAdd}) {
  const [transcript,setTranscript]=useState("");
  const [error,setError]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [foodSugg,setFoodSugg]=useState([]);
  const [showFoodSugg,setShowFoodSugg]=useState(false);
  const foodHistory = useRef(loadFoodHistory());

  const rec = useRecorder(apiKey, text => { setTranscript(text); });
  useEffect(()=>{ rec.start(); return rec.stopAll; },[]);

  const handleTranscriptChange = (val) => {
    setTranscript(val);
    // Check last word typed for food history matches
    const words = val.split(/[\s,]+/);
    const lastWord = words[words.length-1].trim();
    if(lastWord.length>=2){
      const matches = foodHistory.current.filter(f=>f.name.toLowerCase().includes(lastWord.toLowerCase())).slice(0,4);
      setFoodSugg(matches);
      setShowFoodSugg(matches.length>0);
    } else {
      setShowFoodSugg(false);
    }
  };

  const pickFood = (food) => {
    // Append the food name to transcript
    const words = transcript.split(/[\s,]+/);
    words[words.length-1] = food.name;
    setTranscript(words.join(" ") + ` (${food.calories} cal)`);
    setShowFoodSugg(false);
  };

  const submit = async () => {
    if(!transcript.trim()) return;
    rec.stopAll(); setSubmitting(true);
    try {
      const r = await analyze(apiKey,null,transcript);
      const now = new Date();
      onAdd({id:uid(),mealTitle:r.mealTitle,totalCalories:r.totalCalories,ingredients:r.ingredients||[],summary:r.summary,imageBase64:null,time:now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),addedAt:now.getTime(),emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)]});
    } catch(e) { setError(e.message||"Error — check API key"); setSubmitting(false); }
  };

  if(submitting||rec.phase==="transcribing") return <Spinner text={rec.phase==="transcribing"?"Transcribing…":"Calculating calories…"}/>;

  const isRec=rec.phase==="recording", isReq=rec.phase==="requesting";

  return <div style={{height:"100%",background:C.bg,overflowY:"auto",paddingBottom:40}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"env(safe-area-inset-top,44px) 16px 12px",paddingTop:"calc(env(safe-area-inset-top,44px) + 12px)"}}>
      <button style={{width:44,height:44,borderRadius:12,background:C.hover,border:`1px solid ${C.border}`,color:C.text,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={()=>{rec.stopAll();onBack();}}><IcBack/></button>
      <span style={{fontSize:16,fontWeight:700,color:C.text}}>Voice Log</span>
      <div style={{width:44}}/>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:16,padding:"8px 20px 40px"}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,paddingTop:8}}>
        <div onClick={isRec?rec.stop:rec.start} style={{width:100,height:100,borderRadius:"50%",background:isRec?"rgba(255,68,68,0.12)":isReq?"rgba(255,255,255,0.04)":"rgba(74,230,138,0.1)",border:`2px solid ${isRec?C.red:isReq?C.border:C.accent}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:isReq?"default":"pointer",transition:"all 0.3s",boxShadow:isRec?"0 0 0 12px rgba(255,68,68,0.06),0 0 0 24px rgba(255,68,68,0.03)":isReq?"none":"0 0 0 12px rgba(74,230,138,0.06)",animation:isRec?"ripple 1.5s ease-out infinite":"none"}}>
          <div style={{color:isRec?C.red:isReq?C.dim:C.accent}}>{isRec?<IcStop size={32}/>:<IcMic size={40}/>}</div>
        </div>
        <div style={{textAlign:"center"}}>
          <p style={{fontSize:15,fontWeight:600,color:isRec?C.red:isReq?C.dim:C.sub}}>{isReq?"Starting microphone…":isRec?`Recording  ${rec.fmtTime(rec.elapsed)}`:rec.phase==="error"?"Mic blocked — type below":"Tap to start"}</p>
          {isRec&&<p style={{fontSize:12,color:C.dim,marginTop:4}}>Tap to stop when done speaking</p>}
        </div>
      </div>
      <VoiceVisualizer active={isRec}/>

      {/* Transcript with food history suggestions */}
      <div style={{position:"relative"}}>
        <textarea style={{width:"100%",minHeight:110,background:C.surface,border:`1px solid ${transcript?C.aMid:C.border}`,borderRadius:14,color:transcript?C.text:C.sub,fontSize:14,padding:"14px 16px",resize:"none",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",lineHeight:1.65,transition:"border-color 0.2s"}} placeholder="Your words appear here as you speak…&#10;Or tap to type what you ate." value={transcript} onChange={e=>handleTranscriptChange(e.target.value)} onBlur={()=>setTimeout(()=>setShowFoodSugg(false),150)}/>
        {showFoodSugg&&<div style={{position:"absolute",bottom:"100%",left:0,right:0,background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:4,zIndex:10}}>
          <p style={{fontSize:10,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:"0.8px",padding:"8px 14px 4px"}}>Previously logged</p>
          {foodSugg.map((f,i)=>(
            <div key={i} onMouseDown={()=>pickFood(f)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderTop:`1px solid ${C.border}`,cursor:"pointer",background:"transparent"}}
              onMouseEnter={e=>e.currentTarget.style.background=C.hover}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <span style={{fontSize:14,color:C.text}}>{f.name}</span>
              <span style={{fontSize:13,fontWeight:700,color:C.accent}}>{f.calories} cal</span>
            </div>
          ))}
        </div>}
      </div>

      {error&&<p style={{color:C.red,fontSize:13,textAlign:"center",lineHeight:1.5}}>{error}</p>}
      <div style={{display:"flex",gap:10}}>
        {isRec&&<button style={{flexShrink:0,background:C.rDim,border:`2px solid ${C.red}`,borderRadius:14,color:C.red,fontSize:13,fontWeight:700,padding:"16px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}} onClick={rec.stop}>
          <IcStop size={14}/> Stop
        </button>}
        <button style={{flex:1,background:C.accent,border:"none",borderRadius:14,color:C.bg,fontSize:15,fontWeight:700,padding:"16px",cursor:"pointer",opacity:transcript.trim()?1:0.3}} onClick={submit} disabled={!transcript.trim()}>Add to Log →</button>
      </div>
    </div>
  </div>;
}

    </div>

    {/* Photo — flex:1 so it fills all available space between nav and controls */}
    {imagePreview&&<div style={{flex:1,minHeight:0,padding:"0 16px 8px"}}>
      <img src={imagePreview} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:16,border:`1px solid ${C.border}`,display:"block"}} alt=""/>
    </div>}

    {/* Controls pinned at bottom — compact, no scroll needed */}
    <div style={{flexShrink:0,padding:"0 16px calc(env(safe-area-inset-bottom,16px) + 12px)",display:"flex",flexDirection:"column",gap:8}}>

      {/* Mic row + waveform inline */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:C.surface,borderRadius:14,border:`1px solid ${C.border}`}}>
        <div onClick={isRec?rec.stop:rec.start} style={{width:42,height:42,borderRadius:"50%",flexShrink:0,background:isRec?"rgba(255,68,68,0.12)":isReq?"rgba(255,255,255,0.04)":"rgba(74,230,138,0.1)",border:`2px solid ${isRec?C.red:isReq?C.border:C.accent}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:isReq?"default":"pointer",transition:"all 0.3s"}}>
          <div style={{color:isRec?C.red:isReq?C.dim:C.accent}}>{isRec?<IcStop size={14}/>:<IcMic size={18}/>}</div>
        </div>
        {isRec
          ? <div style={{flex:1,height:36}}><VoiceVisualizer active={true}/></div>
          : <span style={{flex:1,fontSize:13,fontWeight:500,color:C.sub}}>{isReq?"Starting mic…":"Tap mic to describe (optional)"}</span>
        }
        {isRec&&<span style={{fontSize:12,color:C.red,fontWeight:600,flexShrink:0}}>{rec.fmtTime(rec.elapsed)}</span>}
      </div>

      {/* Transcript — compact, 3 lines max */}
      <textarea
        style={{width:"100%",height:72,background:C.surface,border:`1px solid ${transcript?C.aMid:C.border}`,borderRadius:12,color:transcript?C.text:C.sub,fontSize:13,padding:"10px 14px",resize:"none",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",lineHeight:1.55}}
        placeholder={"Add details (optional) — ingredients, portions…"}
        value={transcript}
        onChange={e=>setTranscript(e.target.value)}
      />

      {error&&<p style={{color:C.red,fontSize:12,textAlign:"center",margin:"-4px 0"}}>{error}</p>}

      <button style={{width:"100%",background:C.accent,border:"none",borderRadius:13,color:C.bg,fontSize:15,fontWeight:700,padding:"14px",cursor:"pointer"}} onClick={submit}>
        Analyze & Add →
      </button>
    </div>
  </div>;
}

// ─── Swipeable ingredient row ─────────────────────────────────────────────────
function SwipeIngRow({ing,idx,editIdx,ingVal,setIngVal,setEditIdx,commitIng,onDelete,isLast}) {
  const [swipeX,setSwipeX]=useState(0);
  const [swiping,setSwiping]=useState(false);
  const tx=useRef(0),ty=useRef(0);
  const THRESHOLD=70;
  const onTS=e=>{tx.current=e.touches[0].clientX;ty.current=e.touches[0].clientY;setSwiping(false);};
  const onTM=e=>{
    const dx=e.touches[0].clientX-tx.current;
    const dy=Math.abs(e.touches[0].clientY-ty.current);
    if(dy>20&&Math.abs(dx)<20)return;
    if(dx<0){setSwiping(true);setSwipeX(Math.max(dx,-(THRESHOLD+20)));}
  };
  const onTE=()=>{
    if(swipeX<=-THRESHOLD)onDelete(idx);
    else{setSwipeX(0);setSwiping(false);}
  };
  return <div style={{position:"relative",overflow:"hidden",borderTop:`1px solid ${C.border}`}}>
    <div style={{position:"absolute",inset:0,background:C.red,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:16}}>
      <span style={{color:"#fff",fontSize:12,fontWeight:700,marginRight:4}}>Delete</span><IcTrash/>
    </div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",background:C.surface,transform:`translateX(${swipeX}px)`,transition:swiping?"none":"transform 0.3s ease"}}
      onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>
      <span style={{fontSize:14,color:C.text,flex:1}}>{ing.name}</span>
      {editIdx===idx
        ?<input autoFocus style={{width:70,background:"transparent",border:"none",borderBottom:`2px solid ${C.accent}`,color:C.accent,fontSize:14,fontWeight:600,textAlign:"right",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}} value={ingVal} onChange={e=>setIngVal(e.target.value)} onBlur={()=>commitIng(idx)} onKeyDown={e=>e.key==="Enter"&&commitIng(idx)}/>
        :<div style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:C.sub}} onClick={()=>{setEditIdx(idx);setIngVal(String(ing.calories));}}><span style={{fontSize:13,fontWeight:600}}>{ing.calories} kcal{ing.proteinG?` · ${ing.proteinG}g`:""}</span><IcEdit/></div>
      }
    </div>
  </div>;
}

// ─── Detail screen ────────────────────────────────────────────────────────────
function DetailScreen({meal,onBack,onUpdate,onDelete}) {
  const [ings,setIngs]=useState(meal.ingredients||[]);
  const [editTotal,setEditTotal]=useState(false);
  const [totalVal,setTotalVal]=useState(String(meal.totalCalories));
  const [editIdx,setEditIdx]=useState(null);
  const [ingVal,setIngVal]=useState("");
  const isWorkout=meal.type==="workout";

  const commitTotal=()=>{const n=parseInt(totalVal);if(!isNaN(n)&&n>=0)onUpdate({...meal,totalCalories:n,ingredients:ings});else setTotalVal(String(meal.totalCalories));setEditTotal(false);};
  const commitIng=idx=>{const n=parseInt(ingVal);if(!isNaN(n)&&n>=0){const next=ings.map((x,i)=>i===idx?{...x,calories:n}:x);setIngs(next);const tot=next.reduce((s,x)=>s+x.calories,0);setTotalVal(String(tot));onUpdate({...meal,totalCalories:tot,ingredients:next});}setEditIdx(null);};

  return <div style={{height:"100%",background:C.bg,overflowY:"auto",paddingBottom:48}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"env(safe-area-inset-top,44px) 16px 12px",paddingTop:"calc(env(safe-area-inset-top,44px) + 12px)"}}>
      <button style={{width:44,height:44,borderRadius:12,background:C.hover,border:`1px solid ${C.border}`,color:C.text,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={onBack}><IcBack/></button>
      <span style={{fontSize:16,fontWeight:700,color:C.text}}>{isWorkout?"Workout":"Meal Details"}</span>
      <button style={{width:44,height:44,borderRadius:12,background:C.rDim,border:`1px solid ${C.rMid}`,color:C.red,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={()=>onDelete(meal.id)}><IcTrash/></button>
    </div>
    {!isWorkout&&(meal.imageBase64
      ?<img src={`data:image/jpeg;base64,${meal.imageBase64}`} style={{width:"100%",height:250,objectFit:"cover"}} alt=""/>
      :<div style={{width:"100%",height:180,background:C.surface,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:56}}>{meal.emoji||"🍽️"}</span></div>
    )}
    {isWorkout&&<div style={{width:"100%",height:140,background:C.oDim,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:64}}>🔥</span></div>}
    <div style={{padding:"20px 20px 40px"}}>
      <h2 style={{fontSize:22,fontWeight:800,color:isWorkout?C.orange:C.text,marginBottom:6,letterSpacing:"-0.5px"}}>{meal.mealTitle}</h2>
      <p style={{fontSize:13,color:C.sub,lineHeight:1.6,marginBottom:5}}>{meal.summary}</p>
      <p style={{fontSize:11,color:C.dim,marginBottom:20}}>{meal.time}</p>
      <div style={{display:"flex",gap:10,marginBottom:18}}>
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 18px",background:isWorkout?C.oDim:C.aDim,border:`1px solid ${isWorkout?C.oMid:C.aMid}`,borderRadius:16,cursor:"pointer"}} onClick={()=>{setTotalVal(String(meal.totalCalories));setEditTotal(true);}}>
          <span style={{fontSize:13,fontWeight:700,color:C.text}}>{isWorkout?"Calories Burned":"Calories"}</span>
          {editTotal
            ?<input autoFocus style={{width:80,background:"transparent",border:"none",borderBottom:`2px solid ${isWorkout?C.orange:C.accent}`,color:isWorkout?C.orange:C.accent,fontSize:26,fontWeight:800,fontFamily:"'Plus Jakarta Sans',sans-serif",outline:"none",textAlign:"right"}} value={totalVal} onChange={e=>setTotalVal(e.target.value)} onBlur={commitTotal} onKeyDown={e=>e.key==="Enter"&&commitTotal()} onClick={e=>e.stopPropagation()}/>
            :<div style={{display:"flex",alignItems:"center",gap:5,color:isWorkout?C.orange:C.accent}}><span style={{fontSize:26,fontWeight:800,letterSpacing:"-1px"}}>{meal.totalCalories}</span><span style={{fontSize:11,opacity:0.7}}>kcal</span><IcEdit size={13}/></div>
          }
        </div>
        {!isWorkout&&(meal.totalProteinG||0)>0&&<div style={{padding:"16px 14px",background:"rgba(96,200,245,0.1)",border:"1px solid rgba(96,200,245,0.3)",borderRadius:16,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minWidth:72}}>
          <span style={{fontSize:20,fontWeight:800,color:"#60C8F5",letterSpacing:"-0.5px"}}>{meal.totalProteinG}g</span>
          <span style={{fontSize:9,color:C.dim,textTransform:"uppercase",letterSpacing:"0.5px",marginTop:1}}>protein</span>
        </div>}
      </div>
      {!isWorkout&&ings.length>0&&<div style={{background:C.surface,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        <p style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:"1px",padding:"12px 16px 8px"}}>Breakdown</p>
        {ings.map((ing,idx)=><SwipeIngRow key={idx} ing={ing} idx={idx} editIdx={editIdx} ingVal={ingVal} setIngVal={setIngVal} setEditIdx={setEditIdx} commitIng={commitIng} onDelete={idx=>{
          const next=ings.filter((_,i)=>i!==idx);
          setIngs(next);
          const tot=next.reduce((s,x)=>s+x.calories,0);
          setTotalVal(String(tot));
          onUpdate({...meal,totalCalories:tot,ingredients:next});
        }} isLast={idx===ings.length-1}/>)}
      </div>}
    </div>
  </div>;
}

// ─── App root ─────────────────────────────────────────────────────────────────
function App() {
  const [apiKey,setApiKey]=useState(()=>loadKey());
  const [screen,setScreen]=useState("home");
  const [dateKey,setDateKey]=useState(()=>fmtKey(new Date()));
  const dateKeyRef=useRef(fmtKey(new Date())); // always current, no closure issues
  const [baseGoal,setBaseGoal]=useState(()=>loadBaseGoal());
  const [goal,setGoal]=useState(()=>loadGoal());
  const [selected,setSelected]=useState(null);
  const [camImg,setCamImg]=useState({b64:null,preview:null});
  const [meals,setMeals]=useState(()=>loadMeals(fmtKey(new Date())));

  const burned = meals.filter(m=>m.type==="workout").reduce((s,m)=>s+m.totalCalories,0);
  const effectiveGoal = baseGoal + burned;

  // Date navigation — save current meals first using ref, then switch
  const changeDate = (d) => {
    const newKey = fmtKey(d);
    if(newKey === dateKeyRef.current) return;
    // Read current meals directly from localStorage (ground truth) and save them
    // This ensures we save what's actually stored, not what React thinks is stored
    const currentSaved = loadMeals(dateKeyRef.current);
    saveMeals(dateKeyRef.current, currentSaved); // no-op but confirms save
    dateKeyRef.current = newKey;
    setDateKey(newKey);
    const loaded = loadMeals(newKey);
    setMeals(loaded);
  };

  // All mutations write to localStorage via ref key (never stale)
  const mutateMeals = (fn) => {
    const key = dateKeyRef.current;
    const current = loadMeals(key); // always read fresh from localStorage
    const next = fn(current);
    saveMeals(key, next);
    setMeals(next); // update React state so UI re-renders
  };

  const addMeal = m => {
    recordFoodItems(m.ingredients);
    mutateMeals(p=>[...p,m]);
    setScreen("home");
  };
  const addWorkout = w => mutateMeals(p=>[...p,w]);
  const updateMeal = m => {
    recordFoodItems(m.ingredients);
    mutateMeals(p=>p.map(x=>x.id===m.id?m:x));
    setSelected(m);
  };
  const deleteMeal = id => {
    mutateMeals(p=>p.filter(x=>x.id!==id));
    setScreen("home");
  };
  const selectMeal = m => {
    if(m._quickEdit){ mutateMeals(p=>p.map(x=>x.id===m.id?{...x,totalCalories:m._newCal}:x)); return; }
    if(m._delete){ mutateMeals(p=>p.filter(x=>x.id!==m.id)); return; }
    setSelected(m); setScreen("detail");
  };

  if(!apiKey)return <ApiKeyScreen onSave={k=>{saveKey(k);setApiKey(k);}}/>;

  return <div style={{height:"100%"}}>
    {screen==="home"&&<HomeScreen
      onOpenCamera={(b64,preview)=>{setCamImg({b64,preview});setScreen("camera");}}
      onOpenVoice={()=>setScreen("voice")}
      onAddWorkout={addWorkout}
      onSelectMeal={selectMeal}
      meals={meals} goal={effectiveGoal} baseGoal={baseGoal}
      setGoal={g=>{setBaseGoal(g);saveBaseGoal(g);saveGoal(g+burned);}}
      setBaseGoal={setBaseGoal}
      date={new Date(dateKey+"T12:00:00")} setDate={d=>changeDate(d)}
    />}
    {screen==="camera"&&<PhotoScreen apiKey={apiKey} imageBase64={camImg.b64} imagePreview={camImg.preview} onBack={()=>setScreen("home")} onAdd={addMeal}/>}
    {screen==="voice"&&<VoiceScreen apiKey={apiKey} onBack={()=>setScreen("home")} onAdd={addMeal}/>}
    {screen==="detail"&&selected&&<DetailScreen meal={selected} onBack={()=>setScreen("home")} onUpdate={updateMeal} onDelete={deleteMeal}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
