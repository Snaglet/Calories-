let _sharedStream = null;
async function getSharedMicStream() {
  if (_sharedStream && _sharedStream.active) return _sharedStream;
  _sharedStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  return _sharedStream;
}

const isToday = d => fmtKey(d) === fmtKey(new Date());

// ─── Detect image type from base64 bytes ──────────────────────────────────────
function detectMediaType(base64) {
  try {
    const bin = atob(base64.slice(0, 16));
    const b = i => bin.charCodeAt(i);
    if (b(0)===0xFF && b(1)===0xD8) return "image/jpeg";
    if (b(0)===0x89 && b(1)===0x50) return "image/png";
    if (b(0)===0x47 && b(1)===0x49) return "image/gif";
    if (b(0)===0x52 && b(1)===0x49) return "image/webp";
  } catch {}
  return "image/jpeg";
}

// ─── Anthropic API — correct image format for Claude ─────────────────────────
async function analyze(apiKey, imageBase64, description) {
  if (!apiKey) throw new Error("No API key — tap ⚙️ Settings to add your Anthropic key");

  const sysPrompt = `You are a precise nutrition expert. Estimate calories using USDA data, brand nutrition facts, and food label knowledge.
RULES:
- Multiply per-unit calories by stated quantity ("two eggs" = 2x, "3 slices" = 3x)
- Use real brand data: Big Mac=550cal, Whopper=660cal, Slim Jim Original=80cal each, Bubba Burger=420cal
- For photos estimate the ACTUAL visible portion, not default serving size
- Never return 0 calories for real food
- totalCalories must equal sum of ingredient calories
- Also estimate totalProteinG and per-ingredient proteinG
- Return ONLY valid JSON, no markdown, no explanation`;

  const userPrompt = imageBase64
    ? `Analyze this meal photo${description ? `. Extra context: "${description}"` : ""}. Return JSON: {"mealTitle":"...","totalCalories":0,"totalProteinG":0,"ingredients":[{"name":"...","calories":0,"proteinG":0}],"summary":"..."}`
    : `User described: "${description}". Return JSON: {"mealTitle":"...","totalCalories":0,"totalProteinG":0,"ingredients":[{"name":"...","calories":0,"proteinG":0}],"summary":"..."}`;

  // Build content using Anthropic's image format (NOT OpenAI image_url format)
  const contentArr = [];
  if (imageBase64) {
    contentArr.push({
      type: "image",
      source: {
        type: "base64",
        media_type: detectMediaType(imageBase64),
        data: imageBase64
      }
    });
  }
  contentArr.push({ type: "text", text: userPrompt });

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-opus-4-5",
      max_tokens: 1024,
      system: sysPrompt,
      messages: [{ role: "user", content: contentArr }]
    })
  });

  if (!res.ok) {
    let msg = `API error ${res.status}`;
    try { const e = await res.json(); msg = e.error?.message || msg; } catch {}
    if (res.status === 401) throw new Error("Invalid API key — tap ⚙️ to update it");
    if (res.status === 400) throw new Error(`Bad request: ${msg}`);
    throw new Error(msg);
  }

  const data = await res.json();
  const rawText = data.content?.find(b => b.type === "text")?.text || "";
  const cleaned = rawText.trim().replace(/```json\s*/gi,"").replace(/```/g,"").trim();
  try { return JSON.parse(cleaned); }
  catch {
    const match = cleaned.match(/\{[\s\S]*\}/);
    if (match) return JSON.parse(match[0]);
    throw new Error("Unexpected response — please try again");
  }
}

function recordFoodItems(ingredients) {
  if (!ingredients?.length) return;
  const existing = loadFoodHistory();
  const map = {};
  existing.forEach(f => { map[f.name.toLowerCase()] = f; });
  ingredients.forEach(f => { map[f.name.toLowerCase()] = {name:f.name,calories:f.calories,proteinG:f.proteinG||0}; });
  saveFoodHistory(Object.values(map).slice(0,100));
}

// ─── Voice Visualizer ─────────────────────────────────────────────────────────
function VoiceVisualizer({active}) {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);
  const acRef = useRef(null);
  const BARS = 24;
  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const flat = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const bw = canvas.width/BARS;
      ctx.fillStyle = "rgba(74,230,138,0.18)";
      for(let i=0;i<BARS;i++){const h=4;ctx.beginPath();ctx.roundRect(i*bw+1,(canvas.height-h)/2,bw-2,h,2);ctx.fill();}
    };
    if (!active) { cancelAnimationFrame(rafRef.current); try{acRef.current?.close();acRef.current=null;}catch{} flat(); return; }
    const setup = stream => {
      try {
        const ac = new(window.AudioContext||window.webkitAudioContext)();
        acRef.current = ac;
        const src = ac.createMediaStreamSource(stream);
        const an = ac.createAnalyser(); an.fftSize=64; src.connect(an);
        const buf = new Uint8Array(an.frequencyBinCount);
        const draw = () => {
          rafRef.current = requestAnimationFrame(draw);
          an.getByteFrequencyData(buf);
          ctx.clearRect(0,0,canvas.width,canvas.height);
          const bw=canvas.width/BARS,maxH=canvas.height*0.88;
          for(let i=0;i<BARS;i++){const v=buf[Math.floor(i*buf.length/BARS)]/255;const h=Math.max(4,v*maxH);ctx.fillStyle=`rgba(74,230,138,${0.3+v*0.7})`;ctx.beginPath();ctx.roundRect(i*bw+1,(canvas.height-h)/2,bw-2,h,3);ctx.fill();}
        };
        draw();
      } catch { flat(); }
    };
    if (_sharedStream?.active) setup(_sharedStream);
    else getSharedMicStream().then(setup).catch(flat);
    return () => { cancelAnimationFrame(rafRef.current); try{acRef.current?.close();acRef.current=null;}catch{}; };
  }, [active]);
  return <div style={{width:"100%",height:52,display:"flex",alignItems:"center"}}>
    <canvas ref={canvasRef} width={340} height={52} style={{width:"100%",height:"100%",opacity:active?1:0.3,transition:"opacity 0.3s"}}/>
  </div>;
}

// ─── Weight sparkline ─────────────────────────────────────────────────────────
function WeightSparkline({data}) {
  if (data.length<2) return null;
  const W=120,H=36,P=4,vals=data.map(d=>d.value);
  const mn=Math.min(...vals),mx=Math.max(...vals),lo=mn-0.5,hi=mx+0.5,range=hi-lo||1;
  const tx=i=>P+(i/(data.length-1))*(W-P*2),ty=v=>P+(1-(v-lo)/range)*(H-P*2);
  const pts=data.map((d,i)=>`${tx(i)},${ty(d.value)}`).join(" ");
  const area=`M${tx(0)},${ty(data[0].value)} `+data.slice(1).map((d,i)=>`L${tx(i+1)},${ty(d.value)}`).join(" ")+` L${tx(data.length-1)},${H} L${tx(0)},${H} Z`;
  const last=data[data.length-1].value,prev=data[data.length-2].value,color=last<=prev?C.accent:C.red;
  return <svg width={W} height={H} style={{overflow:"visible"}}>
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill="url(#sg)"/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    <circle cx={tx(data.length-1)} cy={ty(last)} r="3" fill={color}/>
  </svg>;
}

// ─── MealCard ─────────────────────────────────────────────────────────────────
function MealCard({meal,onTap,onQuickEdit,onDelete}) {
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(String(meal.totalCalories));
  const [swipeX,setSwipeX]=useState(0);
  const [swiping,setSwiping]=useState(false);
  const tx=useRef(0),ty=useRef(0);
  const isWorkout=meal.type==="workout";
  const THRESHOLD=80;
  const commit=()=>{const n=parseInt(val);if(!isNaN(n)&&n>=0)onQuickEdit(meal.id,n);else setVal(String(meal.totalCalories));setEditing(false);};
  const onTS=e=>{tx.current=e.touches[0].clientX;ty.current=e.touches[0].clientY;setSwiping(false);};
  const onTM=e=>{const dx=e.touches[0].clientX-tx.current;const dy=Math.abs(e.touches[0].clientY-ty.current);if(dy>20&&Math.abs(dx)<20)return;if(dx<0){setSwiping(true);setSwipeX(Math.max(dx,-(THRESHOLD+30)));}};
  const onTE=()=>{if(swipeX<=-THRESHOLD){onDelete(meal.id);}else{setSwipeX(0);setSwiping(false);}};
  return <div style={{position:"relative",marginBottom:10,borderRadius:16,overflow:"hidden"}}>
    <div style={{position:"absolute",inset:0,background:C.red,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:20}}>
      <span style={{color:"#fff",fontSize:13,fontWeight:700,marginRight:6}}>Delete</span><IcTrash/>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:12,background:C.card,border:`1px solid ${isWorkout?C.oMid:C.border}`,borderRadius:16,padding:"12px 14px",cursor:"pointer",transform:`translateX(${swipeX}px)`,transition:swiping?"none":"transform 0.3s ease"}}
      onClick={()=>{if(!editing&&swipeX===0)onTap(meal);}}
      onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>
      {meal.imageBase64
        ?<img src={`data:image/jpeg;base64,${meal.imageBase64}`} style={{width:54,height:54,borderRadius:12,objectFit:"cover",flexShrink:0}} alt=""/>
        :<div style={{width:54,height:54,borderRadius:12,background:isWorkout?C.oDim:C.hover,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:22}}>{isWorkout?"🔥":meal.emoji||"🍽️"}</span></div>
      }
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontSize:14,fontWeight:700,color:isWorkout?C.orange:C.text,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{meal.mealTitle}</p>
        <p style={{fontSize:11,color:C.sub,lineHeight:1.4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{meal.summary}</p>
        <p style={{fontSize:10,color:C.dim,marginTop:3}}>{meal.time}</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"8px 10px",background:isWorkout?C.oDim:C.aDim,borderRadius:12,minWidth:56,position:"relative",flexShrink:0}}
        onClick={e=>{e.stopPropagation();setEditing(true);setVal(String(meal.totalCalories));}}>
        {editing
          ?<input autoFocus type="number" inputMode="numeric" style={{width:48,background:"transparent",border:"none",borderBottom:`2px solid ${isWorkout?C.orange:C.accent}`,color:isWorkout?C.orange:C.accent,fontSize:16,fontWeight:800,textAlign:"center",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}} value={val} onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={e=>e.key==="Enter"&&commit()} onClick={e=>e.stopPropagation()}/>
          :<><span style={{fontSize:16,fontWeight:800,color:isWorkout?C.orange:C.accent,letterSpacing:"-0.5px"}}>{isWorkout?"-":""}{meal.totalCalories}</span><span style={{fontSize:9,color:isWorkout?C.oMid:C.aMid,textTransform:"uppercase"}}>{isWorkout?"burned":"kcal"}</span><span style={{position:"absolute",top:4,right:4,color:isWorkout?C.oMid:C.aMid}}><IcEdit/></span></>
        }
      </div>
    </div>
  </div>;
}

// ─── Workout modal ────────────────────────────────────────────────────────────
function WorkoutModal({onAdd,onClose}) {
  const [cal,setCal]=useState("");
  const [label,setLabel]=useState(()=>ls.get("jct:lastlabel")||"");
  const [suggestions,setSuggestions]=useState([]);
  const [showSugg,setShowSugg]=useState(false);
  const [allLabels]=useState(()=>loadWorkoutLabels());
  const calRef=useRef();
  useEffect(()=>{setTimeout(()=>calRef.current?.focus(),100);},[]);
  const handleLabelChange=v=>{setLabel(v);if(v.trim()){const m=allLabels.filter(l=>l.toLowerCase().includes(v.toLowerCase())&&l.toLowerCase()!==v.toLowerCase());setSuggestions(m);setShowSugg(m.length>0);}else setShowSugg(false);};
  const submit=()=>{
    const n=parseInt(cal);if(isNaN(n)||n<=0)return;
    const fl=label.trim()||"Workout";ls.set("jct:lastlabel",fl);
    if(fl!=="Workout"){const u=[...new Set([fl,...allLabels])].slice(0,20);saveWorkoutLabels(u);}
    const now=new Date();
    onAdd({id:uid(),type:"workout",mealTitle:fl,totalCalories:n,ingredients:[],summary:`${n} calories burned`,imageBase64:null,time:now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),addedAt:now.getTime(),emoji:"🔥"});
  };
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end",zIndex:100}} onClick={onClose}>
    <div style={{width:"100%",background:C.surface,borderRadius:"20px 20px 0 0",padding:"24px 20px 48px",border:`1px solid ${C.border}`}} onClick={e=>e.stopPropagation()}>
      <div style={{width:36,height:4,background:C.border,borderRadius:2,margin:"0 auto 20px"}}/>
      <p style={{fontSize:17,fontWeight:800,color:C.text,marginBottom:4}}>Log Workout</p>
      <p style={{fontSize:12,color:C.sub,marginBottom:20}}>Calories burned will increase today's goal</p>
      <div style={{position:"relative",marginBottom:12}}>
        <input type="text" placeholder="Activity (e.g. OrangeTheory, Walking…)" value={label} onChange={e=>handleLabelChange(e.target.value)} onBlur={()=>setTimeout(()=>setShowSugg(false),150)}
          style={{width:"100%",background:C.hover,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,fontSize:15,padding:"12px 16px",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/>
        {showSugg&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",zIndex:10,marginTop:4}}>
          {suggestions.map((s,i)=><div key={i} onMouseDown={()=>{setLabel(s);setShowSugg(false);}} style={{padding:"12px 16px",fontSize:14,color:C.text,cursor:"pointer",borderBottom:i<suggestions.length-1?`1px solid ${C.border}`:"none"}}>{s}</div>)}
        </div>}
      </div>

// ─── useWebSpeech — browser-native STT, no API key needed ────────────────────
function useWebSpeech(onUpdate) {
  const recRef = useRef(null);
  const [listening, setListening] = useState(false);
  const supported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

  const start = useCallback(() => {
    if (!supported) return;
    try {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const rec = new SR();
      recRef.current = rec;
      rec.continuous = true;
      rec.interimResults = true;
      rec.lang = "en-US";
      let final = "";
      rec.onresult = e => {
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) final += t + " ";
          else interim = t;
        }
        onUpdate(final + interim);
      };
      rec.onerror = () => setListening(false);
      rec.onend = () => setListening(false);
      rec.start();
      setListening(true);
    } catch { setListening(false); }
  }, [supported, onUpdate]);

  const stop = useCallback(() => {
    try { recRef.current?.stop(); } catch {}
    setListening(false);
  }, []);

  return { listening, supported, start, stop };
}

// ─── Voice screen ─────────────────────────────────────────────────────────────
function VoiceScreen({apiKey,onBack,onAdd}) {
  const [transcript,setTranscript]=useState("");
  const [error,setError]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [foodSugg,setFoodSugg]=useState([]);
  const [showFoodSugg,setShowFoodSugg]=useState(false);
  const foodHistRef=useRef(loadFoodHistory());

  const onUpdate = useCallback(text => { setTranscript(text); }, []);
  const speech = useWebSpeech(onUpdate);

  useEffect(() => {
    if (speech.supported) setTimeout(() => speech.start(), 200);
    return () => speech.stop();
  }, []);

  const handleChange = v => {
    setTranscript(v);
    const words = v.split(/[\s,]+/);
    const last = words[words.length-1].trim();
    if (last.length>=2) {
      const m = foodHistRef.current.filter(f=>f.name.toLowerCase().includes(last.toLowerCase())).slice(0,4);
      setFoodSugg(m); setShowFoodSugg(m.length>0);
    } else setShowFoodSugg(false);
  };

  const submit = async () => {
    if (!transcript.trim()) return;
    speech.stop();
    setSubmitting(true);
    try {
      const r = await analyze(apiKey, null, transcript);
      const now = new Date();
      onAdd({id:uid(),mealTitle:r.mealTitle,totalCalories:r.totalCalories,totalProteinG:r.totalProteinG||0,ingredients:r.ingredients||[],summary:r.summary,imageBase64:null,time:now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),addedAt:now.getTime(),emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)]});
    } catch(e) { setError(e.message||"Error — check Settings ⚙️"); setSubmitting(false); }
  };

  if (submitting) return <Spinner text="Calculating calories…"/>;

  return <div style={{height:"100%",background:C.bg,overflowY:"auto",paddingBottom:40}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"calc(env(safe-area-inset-top,44px) + 12px) 16px 12px"}}>
      <button style={{width:44,height:44,borderRadius:12,background:C.hover,border:`1px solid ${C.border}`,color:C.text,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>{speech.stop();onBack();}}><IcBack/></button>
      <span style={{fontSize:16,fontWeight:700,color:C.text}}>Voice Log</span>
      <div style={{width:44}}/>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:16,padding:"8px 20px 40px"}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,paddingTop:8}}>
        <div onClick={speech.listening?speech.stop:speech.start}
          style={{width:100,height:100,borderRadius:"50%",background:speech.listening?"rgba(255,68,68,0.12)":"rgba(74,230,138,0.1)",border:`2px solid ${speech.listening?C.red:C.accent}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.3s",boxShadow:speech.listening?"0 0 0 12px rgba(255,68,68,0.06)":"0 0 0 12px rgba(74,230,138,0.06)",animation:speech.listening?"ripple 1.5s ease-out infinite":"none"}}>
          <div style={{color:speech.listening?C.red:C.accent}}>{speech.listening?<IcStop size={32}/>:<IcMic size={40}/>}</div>
        </div>
        <p style={{fontSize:15,fontWeight:600,color:speech.listening?C.red:C.sub,textAlign:"center"}}>
          {!speech.supported?"Type your meal below":speech.listening?"Listening… tap to stop":"Tap mic to speak"}
        </p>
      </div>
      <VoiceVisualizer active={speech.listening}/>
      <div style={{position:"relative"}}>
        <textarea style={{width:"100%",minHeight:110,background:C.surface,border:`1px solid ${transcript?C.aMid:C.border}`,borderRadius:14,color:transcript?C.text:C.sub,fontSize:14,padding:"14px 16px",resize:"none",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",lineHeight:1.65,transition:"border-color 0.2s"}}
          placeholder={speech.supported?"Words appear here as you speak…\nOr type what you ate.":"Type what you ate (e.g. 'grilled chicken, rice, broccoli')"}
          value={transcript} onChange={e=>handleChange(e.target.value)} onBlur={()=>setTimeout(()=>setShowFoodSugg(false),150)}/>
        {showFoodSugg&&<div style={{position:"absolute",bottom:"100%",left:0,right:0,background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:4,zIndex:10}}>
          <p style={{fontSize:10,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:"0.8px",padding:"8px 14px 4px"}}>Previously logged</p>
          {foodSugg.map((f,i)=><div key={i} onMouseDown={()=>{const w=transcript.split(/[\s,]+/);w[w.length-1]=f.name;setTranscript(w.join(" ")+` (${f.calories} cal)`);setShowFoodSugg(false);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderTop:`1px solid ${C.border}`,cursor:"pointer"}}>
            <span style={{fontSize:14,color:C.text}}>{f.name}</span>
            <span style={{fontSize:13,fontWeight:700,color:C.accent}}>{f.calories} cal</span>
          </div>)}
        </div>}
      </div>
      {error&&<p style={{color:C.red,fontSize:13,textAlign:"center",lineHeight:1.5}}>{error}</p>}
      <div style={{display:"flex",gap:10}}>
        {speech.listening&&<button style={{flexShrink:0,background:C.rDim,border:`2px solid ${C.red}`,borderRadius:14,color:C.red,fontSize:13,fontWeight:700,padding:"16px 14px",display:"flex",alignItems:"center",gap:6}} onClick={speech.stop}><IcStop size={14}/> Stop</button>}
        <button style={{flex:1,background:C.accent,border:"none",borderRadius:14,color:C.bg,fontSize:15,fontWeight:700,padding:"16px",opacity:transcript.trim()?1:0.3}} onClick={submit} disabled={!transcript.trim()}>Add to Log →</button>
      </div>
    </div>
  </div>;
}

// ─── Photo screen ─────────────────────────────────────────────────────────────
function PhotoScreen({apiKey,imageBase64,imagePreview,onBack,onAdd}) {
  const [note,setNote]=useState("");
  const [error,setError]=useState("");
  const [submitting,setSubmitting]=useState(false);

  const onUpdate = useCallback(text => setNote(text), []);
  const speech = useWebSpeech(onUpdate);
  useEffect(() => () => speech.stop(), []);

  // Submit is completely independent: always passes imageBase64 directly to Claude
  const submit = async () => {
    speech.stop();
    setSubmitting(true);
    setError("");
    try {
      const r = await analyze(apiKey, imageBase64, note || undefined);
      const now = new Date();
      onAdd({
        id:uid(), mealTitle:r.mealTitle, totalCalories:r.totalCalories,
        totalProteinG:r.totalProteinG||0, ingredients:r.ingredients||[],
        summary:r.summary, imageBase64,
        time:now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),
        addedAt:now.getTime(), emoji:null
      });
    } catch(e) {
      setError(e.message || "Analysis failed — check Settings ⚙️");
      setSubmitting(false);
    }
  };

  if (submitting) return <Spinner text="Analyzing with Claude…"/>;

  return <div style={{height:"100%",background:C.bg,display:"flex",flexDirection:"column"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"calc(env(safe-area-inset-top,44px) + 8px) 16px 8px",flexShrink:0}}>
      <button style={{width:40,height:40,borderRadius:11,background:C.hover,border:`1px solid ${C.border}`,color:C.text,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>{speech.stop();onBack();}}><IcBack/></button>
      <span style={{fontSize:16,fontWeight:700,color:C.text}}>Add Meal Photo</span>
      <div style={{width:40}}/>
    </div>
    {imagePreview&&<div style={{flex:1,minHeight:0,padding:"0 16px 8px"}}>
      <img src={imagePreview} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:16,border:`1px solid ${C.border}`,display:"block"}} alt=""/>
    </div>}
    <div style={{flexShrink:0,padding:"0 16px calc(env(safe-area-inset-bottom,16px) + 12px)",display:"flex",flexDirection:"column",gap:8}}>
      {speech.supported&&(
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:C.surface,borderRadius:14,border:`1px solid ${C.border}`}}>
          <div onClick={speech.listening?speech.stop:speech.start}
            style={{width:40,height:40,borderRadius:"50%",flexShrink:0,background:speech.listening?"rgba(255,68,68,0.12)":"rgba(74,230,138,0.1)",border:`2px solid ${speech.listening?C.red:C.accent}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.3s"}}>
            <div style={{color:speech.listening?C.red:C.accent}}>{speech.listening?<IcStop size={14}/>:<IcMic size={18}/>}</div>
          </div>
          {speech.listening
            ?<div style={{flex:1,height:36}}><VoiceVisualizer active={true}/></div>
            :<span style={{flex:1,fontSize:13,color:C.sub}}>Tap mic to add voice notes (optional)</span>
          }
        </div>
      )}
      <textarea style={{width:"100%",height:68,background:C.surface,border:`1px solid ${note?C.aMid:C.border}`,borderRadius:12,color:note?C.text:C.sub,fontSize:13,padding:"10px 14px",resize:"none",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",lineHeight:1.55}}
        placeholder="Add notes (optional) — ingredients, portions, brand…"
        value={note} onChange={e=>setNote(e.target.value)}/>
      {error&&<p style={{color:C.red,fontSize:12,textAlign:"center",lineHeight:1.5}}>{error}</p>}
      <button style={{width:"100%",background:C.accent,border:"none",borderRadius:13,color:C.bg,fontSize:15,fontWeight:700,padding:"14px"}} onClick={submit}>
        Analyze & Add →
      </button>
    </div>
  </div>;
}

// ─── SwipeIngRow ──────────────────────────────────────────────────────────────
function SwipeIngRow({ing,idx,editIdx,ingVal,setIngVal,setEditIdx,commitIng,onDelete}) {
  const [swipeX,setSwipeX]=useState(0);const[swiping,setSwiping]=useState(false);
  const tx=useRef(0),ty=useRef(0);const THRESHOLD=70;
  const onTS=e=>{tx.current=e.touches[0].clientX;ty.current=e.touches[0].clientY;setSwiping(false);};
  const onTM=e=>{const dx=e.touches[0].clientX-tx.current;const dy=Math.abs(e.touches[0].clientY-ty.current);if(dy>20&&Math.abs(dx)<20)return;if(dx<0){setSwiping(true);setSwipeX(Math.max(dx,-(THRESHOLD+20)));}};
  const onTE=()=>{if(swipeX<=-THRESHOLD)onDelete(idx);else{setSwipeX(0);setSwiping(false);}};
  return <div style={{position:"relative",overflow:"hidden",borderTop:`1px solid ${C.border}`}}>
    <div style={{position:"absolute",inset:0,background:C.red,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:16}}>
      <span style={{color:"#fff",fontSize:12,fontWeight:700,marginRight:4}}>Delete</span><IcTrash/>
    </div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",background:C.surface,transform:`translateX(${swipeX}px)`,transition:swiping?"none":"transform 0.3s ease"}}
      onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>
      <span style={{fontSize:14,color:C.text,flex:1}}>{ing.name}</span>
      {editIdx===idx
        ?<input autoFocus type="number" inputMode="numeric" style={{width:70,background:"transparent",border:"none",borderBottom:`2px solid ${C.accent}`,color:C.accent,fontSize:14,fontWeight:600,textAlign:"right",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}} value={ingVal} onChange={e=>setIngVal(e.target.value)} onBlur={()=>commitIng(idx)} onKeyDown={e=>e.key==="Enter"&&commitIng(idx)}/>
        :<div style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:C.sub}} onClick={()=>{setEditIdx(idx);setIngVal(String(ing.calories));}}><span style={{fontSize:13,fontWeight:600}}>{ing.calories} kcal{ing.proteinG?` · ${ing.proteinG}g`:""}</span><IcEdit/></div>
      }
    </div>
  </div>;
}

// ─── Detail screen ────────────────────────────────────────────────────────────
function DetailScreen({meal,onBack,onUpdate,onDelete}) {
  const [ings,setIngs]=useState(meal.ingredients||[]);
  const [editTotal,setEditTotal]=useState(false);
  const [totalVal,setTotalVal]=useState(String(meal.totalCalories));
  const [editIdx,setEditIdx]=useState(null);
  const [ingVal,setIngVal]=useState("");
  const isWorkout=meal.type==="workout";
  const commitTotal=()=>{const n=parseInt(totalVal);if(!isNaN(n)&&n>=0)onUpdate({...meal,totalCalories:n,ingredients:ings});else setTotalVal(String(meal.totalCalories));setEditTotal(false);};
  const commitIng=idx=>{const n=parseInt(ingVal);if(!isNaN(n)&&n>=0){const next=ings.map((x,i)=>i===idx?{...x,calories:n}:x);setIngs(next);const tot=next.reduce((s,x)=>s+x.calories,0);setTotalVal(String(tot));onUpdate({...meal,totalCalories:tot,ingredients:next});}setEditIdx(null);};
  return <div style={{height:"100%",background:C.bg,overflowY:"auto",paddingBottom:48}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"calc(env(safe-area-inset-top,44px) + 12px) 16px 12px"}}>
      <button style={{width:44,height:44,borderRadius:12,background:C.hover,border:`1px solid ${C.border}`,color:C.text,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onBack}><IcBack/></button>
      <span style={{fontSize:16,fontWeight:700,color:C.text}}>{isWorkout?"Workout":"Meal Details"}</span>
      <button style={{width:44,height:44,borderRadius:12,background:C.rDim,border:`1px solid ${C.rMid}`,color:C.red,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>onDelete(meal.id)}><IcTrash/></button>
    </div>
    {!isWorkout&&(meal.imageBase64?<img src={`data:image/jpeg;base64,${meal.imageBase64}`} style={{width:"100%",height:250,objectFit:"cover"}} alt=""/>:<div style={{width:"100%",height:180,background:C.surface,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:56}}>{meal.emoji||"🍽️"}</span></div>)}
    {isWorkout&&<div style={{width:"100%",height:140,background:C.oDim,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:64}}>🔥</span></div>}
    <div style={{padding:"20px 20px 40px"}}>
      <h2 style={{fontSize:22,fontWeight:800,color:isWorkout?C.orange:C.text,marginBottom:6,letterSpacing:"-0.5px"}}>{meal.mealTitle}</h2>
      <p style={{fontSize:13,color:C.sub,lineHeight:1.6,marginBottom:5}}>{meal.summary}</p>
      <p style={{fontSize:11,color:C.dim,marginBottom:20}}>{meal.time}</p>
      <div style={{display:"flex",gap:10,marginBottom:18}}>
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 18px",background:isWorkout?C.oDim:C.aDim,border:`1px solid ${isWorkout?C.oMid:C.aMid}`,borderRadius:16,cursor:"pointer"}} onClick={()=>{setTotalVal(String(meal.totalCalories));setEditTotal(true);}}>
          <span style={{fontSize:13,fontWeight:700,color:C.text}}>{isWorkout?"Calories Burned":"Calories"}</span>
          {editTotal
            ?<input autoFocus type="number" inputMode="numeric" style={{width:80,background:"transparent",border:"none",borderBottom:`2px solid ${isWorkout?C.orange:C.accent}`,color:isWorkout?C.orange:C.accent,fontSize:26,fontWeight:800,fontFamily:"'Plus Jakarta Sans',sans-serif",outline:"none",textAlign:"right"}} value={totalVal} onChange={e=>setTotalVal(e.target.value)} onBlur={commitTotal} onKeyDown={e=>e.key==="Enter"&&commitTotal()} onClick={e=>e.stopPropagation()}/>
            :<div style={{display:"flex",alignItems:"center",gap:5,color:isWorkout?C.orange:C.accent}}><span style={{fontSize:26,fontWeight:800,letterSpacing:"-1px"}}>{meal.totalCalories}</span><span style={{fontSize:11,opacity:0.7}}>kcal</span><IcEdit size={13}/></div>
          }
        </div>
        {!isWorkout&&(meal.totalProteinG||0)>0&&<div style={{padding:"16px 14px",background:"rgba(96,200,245,0.1)",border:"1px solid rgba(96,200,245,0.3)",borderRadius:16,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minWidth:72}}>
          <span style={{fontSize:20,fontWeight:800,color:"#60C8F5",letterSpacing:"-0.5px"}}>{meal.totalProteinG}g</span>
          <span style={{fontSize:9,color:C.dim,textTransform:"uppercase",letterSpacing:"0.5px",marginTop:1}}>protein</span>
        </div>}
      </div>
      {!isWorkout&&ings.length>0&&<div style={{background:C.surface,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        <p style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:"1px",padding:"12px 16px 8px"}}>Breakdown</p>
        {ings.map((ing,idx)=><SwipeIngRow key={idx} ing={ing} idx={idx} editIdx={editIdx} ingVal={ingVal} setIngVal={setIngVal} setEditIdx={setEditIdx} commitIng={commitIng} onDelete={i=>{const next=ings.filter((_,j)=>j!==i);setIngs(next);const tot=next.reduce((s,x)=>s+x.calories,0);setTotalVal(String(tot));onUpdate({...meal,totalCalories:tot,ingredients:next});}}/>)}
      </div>}
    </div>
  </div>;
}

// ─── App root ─────────────────────────────────────────────────────────────────
function App() {
  const [apiKey,setApiKey]=useState(()=>loadKey());
  const [screen,setScreen]=useState("home");
  const [baseGoal,setBaseGoal]=useState(()=>loadBaseGoal());
  const [selected,setSelected]=useState(null);
  const [camImg,setCamImg]=useState({b64:null,preview:null});
  const dateKeyRef=useRef(fmtKey(new Date()));
  const [,forceRender]=useState(0);
  const bump=()=>forceRender(n=>n+1);
  const dateKey=dateKeyRef.current;
  const meals=loadMeals(dateKey);
  const burned=meals.filter(m=>m.type==="workout").reduce((s,m)=>s+m.totalCalories,0);
  const effectiveGoal=baseGoal+burned;
  const changeDate=d=>{const k=fmtKey(d);if(k===dateKeyRef.current)return;dateKeyRef.current=k;bump();};
  const addMeal=m=>{recordFoodItems(m.ingredients);const k=dateKeyRef.current;saveMeals(k,[...loadMeals(k),m]);setScreen("home");bump();};
  const addWorkout=w=>{const k=dateKeyRef.current;saveMeals(k,[...loadMeals(k),w]);bump();};
  const updateMeal=m=>{recordFoodItems(m.ingredients);const k=dateKeyRef.current;saveMeals(k,loadMeals(k).map(x=>x.id===m.id?m:x));setSelected(m);bump();};
  const deleteMeal=id=>{const k=dateKeyRef.current;saveMeals(k,loadMeals(k).filter(x=>x.id!==id));setScreen("home");bump();};
  const saveApiKey=k=>{saveKey(k);setApiKey(k);};
  const selectMeal=m=>{
    if(m._quickEdit){const k=dateKeyRef.current;saveMeals(k,loadMeals(k).map(x=>x.id===m.id?{...x,totalCalories:m._newCal}:x));bump();return;}
    if(m._delete){const k=dateKeyRef.current;saveMeals(k,loadMeals(k).filter(x=>x.id!==m.id));bump();return;}
    setSelected(m);setScreen("detail");
  };

  if (!apiKey) return <ApiKeyScreen onSave={saveApiKey}/>;

  return <div style={{height:"100%"}}>
    {screen==="home"&&<HomeScreen
      onOpenCamera={(b64,preview)=>{setCamImg({b64,preview});setScreen("camera");}}
      onOpenVoice={()=>setScreen("voice")}
      onAddWorkout={addWorkout} onSelectMeal={selectMeal}
      onOpenSettings={()=>setScreen("settings")}
      meals={meals} goal={effectiveGoal} baseGoal={baseGoal}
      setBaseGoal={n=>{setBaseGoal(n);saveBaseGoal(n);}}
      date={new Date(dateKey+"T12:00:00")} setDate={changeDate}
    />}
    {screen==="camera"&&<PhotoScreen apiKey={apiKey} imageBase64={camImg.b64} imagePreview={camImg.preview} onBack={()=>setScreen("home")} onAdd={addMeal}/>}
    {screen==="voice"&&<VoiceScreen apiKey={apiKey} onBack={()=>setScreen("home")} onAdd={addMeal}/>}
    {screen==="detail"&&selected&&<DetailScreen meal={selected} onBack={()=>setScreen("home")} onUpdate={updateMeal} onDelete={deleteMeal}/>}
    {screen==="settings"&&<SettingsScreen apiKey={apiKey} onSave={saveApiKey} onBack={()=>setScreen("home")}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
