// ─── OpenAI helpers ───────────────────────────────────────────────────────────
async function analyze(apiKey, imageBase64, description) {
  const content = [];
  if (imageBase64) content.push({type:"image_url",image_url:{url:`data:image/jpeg;base64,${imageBase64}`,detail:"high"}});
  const prompt = imageBase64
    ? `Analyze this meal photo${description?` and this description: "${description}"`:""}. Return ONLY valid JSON, no markdown:\n{"mealTitle":"...","totalCalories":0,"ingredients":[{"name":"...","calories":0}],"summary":"..."}`
    : `User described: "${description}". Estimate calories. Return ONLY valid JSON, no markdown:\n{"mealTitle":"...","totalCalories":0,"ingredients":[{"name":"...","calories":0}],"summary":"..."}`;
  content.push({type:"text",text:prompt});
  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
    body:JSON.stringify({model:"gpt-4o",messages:[{role:"user",content}],max_tokens:600,temperature:0.3})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"OpenAI error");}
  const data = await res.json();
  return JSON.parse(data.choices[0].message.content.trim().replace(/```json|```/g,"").trim());
}

async function transcribeAudio(apiKey, blob) {
  // iOS Safari uses audio/mp4, try to use that if available
  const mimeType = blob.type || "audio/webm";
  const ext = mimeType.includes("mp4") ? "m4a" : mimeType.includes("ogg") ? "ogg" : "webm";
  const fd = new FormData();
  fd.append("file", blob, `audio.${ext}`);
  fd.append("model","whisper-1");
  fd.append("language","en");
  const res = await fetch("https://api.openai.com/v1/audio/transcriptions",{
    method:"POST",
    headers:{"Authorization":`Bearer ${apiKey}`},
    body:fd
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"Whisper error");}
  const data = await res.json();
  return data.text || "";
}

function VoiceVisualizer({active}) {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);
  const streamRef = useRef(null);
  const BARS = 24;

  useEffect(() => {
    const canvas = canvasRef.current; if(!canvas) return;
    const ctx = canvas.getContext("2d");
    const drawFlat = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const bw = canvas.width/BARS;
      ctx.fillStyle = "rgba(74,230,138,0.18)";
      for(let i=0;i<BARS;i++){
        const h=4; ctx.beginPath();
        ctx.roundRect(i*bw+1,(canvas.height-h)/2,bw-2,h,2); ctx.fill();
      }
    };
    if(!active){cancelAnimationFrame(rafRef.current);try{streamRef.current?.getTracks().forEach(t=>t.stop());}catch{}streamRef.current=null;drawFlat();return;}
    navigator.mediaDevices?.getUserMedia({audio:true,video:false}).then(stream=>{
      streamRef.current=stream;
      const ac=new (window.AudioContext||window.webkitAudioContext)();
      const src=ac.createMediaStreamSource(stream);
      const an=ac.createAnalyser(); an.fftSize=64; src.connect(an);
      const buf=new Uint8Array(an.frequencyBinCount);
      const draw=()=>{
        rafRef.current=requestAnimationFrame(draw);
        an.getByteFrequencyData(buf);
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const bw=canvas.width/BARS, maxH=canvas.height*0.88;
        for(let i=0;i<BARS;i++){
          const val=buf[Math.floor(i*buf.length/BARS)]/255;
          const h=Math.max(4,val*maxH);
          ctx.fillStyle=`rgba(74,230,138,${0.3+val*0.7})`;
          ctx.beginPath(); ctx.roundRect(i*bw+1,(canvas.height-h)/2,bw-2,h,3); ctx.fill();
        }
      };
      draw();
    }).catch(drawFlat);
    return()=>{cancelAnimationFrame(rafRef.current);try{streamRef.current?.getTracks().forEach(t=>t.stop());}catch{}};
  },[active]);

  return <div style={{width:"100%",height:56,display:"flex",alignItems:"center"}}>
    <canvas ref={canvasRef} width={340} height={56} style={{width:"100%",height:"100%",opacity:active?1:0.3,transition:"opacity 0.3s"}}/>
  </div>;
}

// ─── Weight sparkline ─────────────────────────────────────────────────────────
function WeightSparkline({data}) {
  if(data.length<2) return null;
  const W=120,H=36,P=4,vals=data.map(d=>d.value);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const lo=mn-0.5,hi=mx+0.5,range=hi-lo||1;
  const tx=i=>P+(i/(data.length-1))*(W-P*2);
  const ty=v=>P+(1-(v-lo)/range)*(H-P*2);
  const pts=data.map((d,i)=>`${tx(i)},${ty(d.value)}`).join(" ");
  const area=`M${tx(0)},${ty(data[0].value)} `+data.slice(1).map((d,i)=>`L${tx(i+1)},${ty(d.value)}`).join(" ")+` L${tx(data.length-1)},${H} L${tx(0)},${H} Z`;
  const last=data[data.length-1].value,prev=data[data.length-2].value;
  const color=last<=prev?C.accent:C.red;
  return <svg width={W} height={H} style={{overflow:"visible"}}>
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill="url(#sg)"/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    <circle cx={tx(data.length-1)} cy={ty(last)} r="3" fill={color}/>
  </svg>;
}

  const pct=Math.min((eaten/Math.max(goal,1))*100,100);
  const r=48,cx=56,cy=56,sw=7,circ=2*Math.PI*r;
  const color=pct>100?C.red:pct>85?"#FF9500":C.accent;
  return <svg width="112" height="112" style={{filter:`drop-shadow(0 0 10px ${color}44)`,flexShrink:0}}>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={sw}/>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round"
      strokeDasharray={`${(pct/100)*circ} ${circ}`} strokeDashoffset={circ*0.25}
      style={{transition:"stroke-dasharray 0.5s ease,stroke 0.3s"}}/>
    <text x={cx} y={cy-4} textAnchor="middle" fill="white" style={{fontSize:17,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{eaten}</text>

  </svg>;
}

            :<span style={{fontSize:28,fontWeight:800,color:C.text,letterSpacing:"-1px",lineHeight:1,cursor:"pointer"}} onClick={()=>{setWeightVal(latestW>0?String(latestW):"");setEditWeight(true);}}>{latestW>0?latestW:"—"}</span>
          }
          {!editWeight&&<span style={{color:C.dim,cursor:"pointer",display:"inline-flex",alignItems:"center",marginLeft:3}} onClick={()=>{setWeightVal(latestW>0?String(latestW):"");setEditWeight(true);}}><IcEdit/></span>}
        </div>
        <span style={{fontSize:10,color:C.dim,fontWeight:500,marginTop:1}}>{editWeight?"lbs, then return":"lbs"}</span>
        {weightLog.length>=2&&<div style={{marginTop:6}}><WeightSparkline data={weightLog}/></div>}

    {/* Add buttons */}
    <div style={{display:"flex",gap:12,padding:"0 16px 18px"}}>

      <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onOpenCamera(ev.target.result.split(",")[1],ev.target.result);r.readAsDataURL(f);e.target.value="";}}/>
      <button style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",background:C.aDim,border:`1px solid ${C.aMid}`,borderRadius:16,color:C.accent,cursor:"pointer"}} onClick={onOpenVoice}><IcMic/></button>

// ─── Voice screen ─────────────────────────────────────────────────────────────
function VoiceScreen({apiKey,onBack,onAdd}) {
  const [phase,setPhase]=useState("idle");
  const [transcript,setTranscript]=useState("");
  const [error,setError]=useState("");
  const [elapsed,setElapsed]=useState(0);
  const mrRef=useRef(null), chunksRef=useRef([]), timerRef=useRef(null), streamRef=useRef(null);

  const fmtTime=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  const stopAll=()=>{
    clearInterval(timerRef.current);
    try{mrRef.current?.stop();}catch{}
    try{streamRef.current?.getTracks().forEach(t=>t.stop());}catch{}
  };

  const startRec=async()=>{
    setPhase("requesting");setError("");setElapsed(0);chunksRef.current=[];
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=stream;
      // Pick the best supported mimeType for this browser/device
      const mimeTypes=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg","audio/wav",""];
      const mimeType=mimeTypes.find(m=>!m||MediaRecorder.isTypeSupported(m))||"";
      const mr=new MediaRecorder(stream,mimeType?{mimeType}:{});
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const mtype=mr.mimeType||"audio/webm";
        const blob=new Blob(chunksRef.current,{type:mtype});
        if(blob.size<1000){setPhase("idle");return;}
        setPhase("transcribing");
        try{const text=await transcribeAudio(apiKey,blob);setTranscript(text);setPhase("editing");}
        catch(e){setError(e.message||"Transcription failed");setPhase("editing");}
      };
      mr.start(250);mrRef.current=mr;setPhase("recording");
    }catch(e){
      setError("Microphone access denied. Type your meal below.");
      setPhase("editing");
    }
  };

  const stopRec=()=>{try{mrRef.current?.stop();}catch{}};

  useEffect(()=>{
    if(phase==="recording"){timerRef.current=setInterval(()=>setElapsed(e=>e+1),1000);}
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[phase]);

  useEffect(()=>{startRec();return stopAll;},[]);

  const submit=async()=>{
    if(!transcript.trim())return;
    setPhase("processing");
    try{
      const r=await analyze(apiKey,null,transcript);
      const now=new Date();
      onAdd({id:uid(),mealTitle:r.mealTitle,totalCalories:r.totalCalories,ingredients:r.ingredients||[],summary:r.summary,imageBase64:null,time:now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),addedAt:now.getTime(),emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)]});
    }catch(e){setError(e.message||"Error — check API key");setPhase("editing");}
  };

  if(phase==="transcribing")return <Spinner text="Transcribing your voice…"/>;
  if(phase==="processing")return <Spinner text="Calculating calories…"/>;

  const isRec=phase==="recording", isReq=phase==="requesting";

  return <div style={{height:"100%",background:C.bg,overflowY:"auto",paddingBottom:40}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"env(safe-area-inset-top,44px) 16px 12px",paddingTop:`calc(env(safe-area-inset-top,44px) + 12px)`}}>
      <button style={{width:44,height:44,borderRadius:12,background:C.hover,border:`1px solid ${C.border}`,color:C.text,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={()=>{stopAll();onBack();}}><IcBack/></button>
      <span style={{fontSize:16,fontWeight:700,color:C.text}}>Voice Log</span>
      <div style={{width:44}}/>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:16,padding:"8px 20px 40px"}}>
      {/* Big mic */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,paddingTop:8,paddingBottom:4}}>
        <div onClick={isRec?stopRec:startRec} style={{
          width:100,height:100,borderRadius:"50%",
          background:isRec?"rgba(255,68,68,0.12)":isReq?"rgba(255,255,255,0.04)":"rgba(74,230,138,0.1)",
          border:`2px solid ${isRec?C.red:isReq?C.border:C.accent}`,
          display:"flex",alignItems:"center",justifyContent:"center",
          cursor:isReq?"default":"pointer",transition:"all 0.3s",
          boxShadow:isRec?`0 0 0 12px rgba(255,68,68,0.06),0 0 0 24px rgba(255,68,68,0.03)`:isReq?"none":`0 0 0 12px rgba(74,230,138,0.06)`,
          animation:isRec?"ripple 1.5s ease-out infinite":"none"
        }}>
          <div style={{color:isRec?C.red:isReq?C.dim:C.accent}}>
            {isRec?<IcStop size={32}/>:<IcMic size={40}/>}
          </div>
        </div>
        <div style={{textAlign:"center"}}>
          <p style={{fontSize:15,fontWeight:600,color:isRec?C.red:isReq?C.dim:C.sub}}>
            {isReq?"Starting microphone…":isRec?`Recording  ${fmtTime(elapsed)}`:phase==="editing"?"Tap mic to record again":"Tap mic to start"}
          </p>
          {isRec&&<p style={{fontSize:12,color:C.dim,marginTop:4}}>Tap to stop when done speaking</p>}
        </div>
      </div>

      <VoiceVisualizer active={isRec}/>

      {(phase==="editing"||transcript)&&<textarea autoFocus={phase==="editing"} style={{width:"100%",minHeight:110,background:C.surface,border:`1px solid ${transcript?C.aMid:C.border}`,borderRadius:14,color:transcript?C.text:C.sub,fontSize:14,padding:"14px 16px",resize:"none",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",lineHeight:1.65,transition:"border-color 0.2s"}} placeholder="Tap to type what you ate…" value={transcript} onChange={e=>setTranscript(e.target.value)}/>}
      {phase==="idle"&&!transcript&&<textarea style={{width:"100%",minHeight:80,background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,color:C.sub,fontSize:14,padding:"14px 16px",resize:"none",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",lineHeight:1.65}} placeholder="Or type your meal here…" value={transcript} onChange={e=>setTranscript(e.target.value)}/>}

      {error&&<p style={{color:C.red,fontSize:13,textAlign:"center",lineHeight:1.5}}>{error}</p>}
      <button style={{width:"100%",background:C.accent,border:"none",borderRadius:14,color:C.bg,fontSize:15,fontWeight:700,padding:"16px",cursor:"pointer",opacity:transcript.trim()?1:0.3}} onClick={submit} disabled={!transcript.trim()}>Add to Log →</button>
    </div>
  </div>;
}

// ─── Detail screen ────────────────────────────────────────────────────────────
function DetailScreen({meal,onBack,onUpdate,onDelete}) {
  const [ings,setIngs]=useState(meal.ingredients||[]);
  const [editTotal,setEditTotal]=useState(false);
  const [totalVal,setTotalVal]=useState(String(meal.totalCalories));
  const [editIdx,setEditIdx]=useState(null);
  const [ingVal,setIngVal]=useState("");

  const commitTotal=()=>{const n=parseInt(totalVal);if(!isNaN(n)&&n>=0)onUpdate({...meal,totalCalories:n,ingredients:ings});else setTotalVal(String(meal.totalCalories));setEditTotal(false);};
  const commitIng=idx=>{const n=parseInt(ingVal);if(!isNaN(n)&&n>=0){const next=ings.map((x,i)=>i===idx?{...x,calories:n}:x);setIngs(next);const tot=next.reduce((s,x)=>s+x.calories,0);setTotalVal(String(tot));onUpdate({...meal,totalCalories:tot,ingredients:next});}setEditIdx(null);};

  return <div style={{height:"100%",background:C.bg,overflowY:"auto",paddingBottom:48}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"env(safe-area-inset-top,44px) 16px 12px",paddingTop:`calc(env(safe-area-inset-top,44px) + 12px)`}}>
      <button style={{width:44,height:44,borderRadius:12,background:C.hover,border:`1px solid ${C.border}`,color:C.text,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={onBack}><IcBack/></button>
      <span style={{fontSize:16,fontWeight:700,color:C.text}}>Meal Details</span>
      <button style={{width:44,height:44,borderRadius:12,background:C.rDim,border:`1px solid ${C.rMid}`,color:C.red,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={()=>onDelete(meal.id)}><IcTrash/></button>
    </div>
    {meal.imageBase64
      ?<img src={`data:image/jpeg;base64,${meal.imageBase64}`} style={{width:"100%",height:250,objectFit:"cover"}} alt=""/>
      :<div style={{width:"100%",height:180,background:C.surface,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:56}}>{meal.emoji||"🍽️"}</span></div>
    }
    <div style={{padding:"20px 20px 40px"}}>
      <h2 style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:6,letterSpacing:"-0.5px"}}>{meal.mealTitle}</h2>
      <p style={{fontSize:13,color:C.sub,lineHeight:1.6,marginBottom:5}}>{meal.summary}</p>
      <p style={{fontSize:11,color:C.dim,marginBottom:20}}>{meal.time}</p>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 18px",background:C.aDim,border:`1px solid ${C.aMid}`,borderRadius:16,marginBottom:18,cursor:"pointer"}} onClick={()=>{setTotalVal(String(meal.totalCalories));setEditTotal(true);}}>
        <span style={{fontSize:14,fontWeight:700,color:C.text}}>Total Calories</span>
        {editTotal
          ?<input autoFocus style={{width:80,background:"transparent",border:"none",borderBottom:`2px solid ${C.accent}`,color:C.accent,fontSize:28,fontWeight:800,fontFamily:"'Plus Jakarta Sans',sans-serif",outline:"none",textAlign:"right"}} value={totalVal} onChange={e=>setTotalVal(e.target.value)} onBlur={commitTotal} onKeyDown={e=>e.key==="Enter"&&commitTotal()} onClick={e=>e.stopPropagation()}/>
          :<div style={{display:"flex",alignItems:"center",gap:6,color:C.accent}}><span style={{fontSize:28,fontWeight:800,letterSpacing:"-1px"}}>{meal.totalCalories}</span><span style={{fontSize:12,opacity:0.7}}>kcal</span><IcEdit size={14}/></div>
        }
      </div>
      {ings.length>0&&<div style={{background:C.surface,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        <p style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:"1px",padding:"12px 16px 8px"}}>Breakdown</p>
        {ings.map((ing,idx)=><div key={idx} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderTop:`1px solid ${C.border}`}}>
          <span style={{fontSize:14,color:C.text,flex:1}}>{ing.name}</span>
          {editIdx===idx
            ?<input autoFocus style={{width:70,background:"transparent",border:"none",borderBottom:`2px solid ${C.accent}`,color:C.accent,fontSize:14,fontWeight:600,textAlign:"right",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}} value={ingVal} onChange={e=>setIngVal(e.target.value)} onBlur={()=>commitIng(idx)} onKeyDown={e=>e.key==="Enter"&&commitIng(idx)}/>
            :<div style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:C.sub}} onClick={()=>{setEditIdx(idx);setIngVal(String(ing.calories));}}><span style={{fontSize:14,fontWeight:600}}>{ing.calories} kcal</span><IcEdit/></div>
          }
        </div>)}
      </div>}
    </div>
  </div>;
}

// ─── App root ─────────────────────────────────────────────────────────────────
function App() {
  const [apiKey,setApiKey]=useState(()=>loadKey());
  const [screen,setScreen]=useState("home");
  const [date,setDate]=useState(new Date());
  const [meals,setMeals]=useState(()=>loadMeals(fmtKey(new Date())));
  const [goal,setGoal]=useState(()=>loadGoal());
  const [selected,setSelected]=useState(null);
  const [camImg,setCamImg]=useState({b64:null,preview:null});

  useEffect(()=>{setMeals(loadMeals(fmtKey(date)));},[date]);
  useEffect(()=>{saveMeals(fmtKey(date),meals);},[meals]);

  const addMeal=m=>{setMeals(p=>[...p,m]);setScreen("home");};
  const updateMeal=m=>{setMeals(p=>p.map(x=>x.id===m.id?m:x));setSelected(m);};
  const deleteMeal=id=>{setMeals(p=>p.filter(x=>x.id!==id));setScreen("home");};
  const selectMeal=m=>{if(m._quickEdit){setMeals(p=>p.map(x=>x.id===m.id?{...x,totalCalories:m._newCal}:x));return;}setSelected(m);setScreen("detail");};

  if(!apiKey)return <ApiKeyScreen onSave={k=>{saveKey(k);setApiKey(k);}}/>;

  return <div style={{height:"100%"}}>
    {screen==="home"&&<HomeScreen onOpenCamera={(b64,preview)=>{setCamImg({b64,preview});setScreen("camera");}} onOpenVoice={()=>setScreen("voice")} onSelectMeal={selectMeal} meals={meals} goal={goal} setGoal={g=>{setGoal(g);saveGoal(g);}} date={date} setDate={setDate}/>}
    {screen==="camera"&&<PhotoScreen apiKey={apiKey} imageBase64={camImg.b64} imagePreview={camImg.preview} onBack={()=>setScreen("home")} onAdd={addMeal}/>}
    {screen==="voice"&&<VoiceScreen apiKey={apiKey} onBack={()=>setScreen("home")} onAdd={addMeal}/>}
    {screen==="detail"&&selected&&<DetailScreen meal={selected} onBack={()=>setScreen("home")} onUpdate={updateMeal} onDelete={deleteMeal}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
